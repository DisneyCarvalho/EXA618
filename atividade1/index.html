<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Disney Carvalho Andrade Filho</title>
</head>
<body>

<h2>Extrair Dados da Receita</h2>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRInukqx5QHgkCUaO6cruDYJXWIejFiz4FRMg&s" alt="">

<form>

<label>Link da Receita:</label><br>
<input type="url" name="link_receita" placeholder="Cole o link da receita aqui"><br><br>

<label>Nome da Receita:</label><br>
<input type="text" name="nome_receita"><br><br>

<label>Ingredientes:</label><br>
<textarea name="ingredientes" rows="5" cols="40"></textarea><br><br>

<label>Tempo de Preparo:</label><br>
<input type="text" name="tempo_preparo"><br><br>

<label>Rendimento:</label><br>
<input type="text" name="rendimento"><br><br>

<label>Modo de Preparo:</label><br>
<textarea name="modo_preparo" rows="6" cols="40"></textarea><br><br>

<button type="submit">Processar Receita</button>

</form>

</body>
</html>
